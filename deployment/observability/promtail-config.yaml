server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: app-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: quote-gen
          __path__: /var/log/quote-gen/*.log
    pipeline_stages:
      - json:
          expressions:
            ts: ts
            level: level
            msg: msg
            component: component
            traceId: traceId
            spanId: spanId
            quoteId: quoteId
            eventType: eventType
            durationMs: durationMs
            method: method
            path: path
            statusCode: statusCode
      - labels:
          level:
          component:
      - timestamp:
          source: ts
          format: RFC3339

  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(quote-gen-.*)'
        target_label: 'container'
    pipeline_stages:
      - json:
          expressions:
            ts: ts
            level: level
            msg: msg
            component: component
            traceId: traceId
            eventType: eventType
            durationMs: durationMs
      - labels:
          level:
          component:
          container:
      - timestamp:
          source: ts
          format: RFC3339
