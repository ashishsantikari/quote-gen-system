services:
  loki:
    image: grafana/loki:latest
    container_name: quote-gen-loki
    ports:
      - "3110:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
      - loki-data:/loki

  promtail:
    image: grafana/promtail:latest
    container_name: quote-gen-promtail
    volumes:
      - ./promtail-config.yaml:/etc/promtail/config.yaml
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ../../logs:/var/log/quote-gen:ro
    command: -config.file=/etc/promtail/config.yaml

  prometheus:
    image: prom/prometheus:latest
    container_name: quote-gen-prometheus
    ports:
      - "3112:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'

  tempo:
    image: grafana/tempo:latest
    container_name: quote-gen-tempo
    command: -config.file=/etc/tempo.yaml
    volumes:
      - ./tempo-config.yaml:/etc/tempo.yaml
      - tempo-data:/var/tempo
    ports:
      - "3210:3200"
      - "4327:4317"
      - "4328:4318"

  grafana:
    image: grafana/grafana:latest
    container_name: quote-gen-grafana
    ports:
      - "3111:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./grafana-dashboard.json:/etc/grafana/provisioning/dashboards/quote-gen.json
      - ./grafana-dashboard-provider.yaml:/etc/grafana/provisioning/dashboards/provider.yaml
      - grafana-data:/var/lib/grafana

volumes:
  loki-data:
  tempo-data:
  grafana-data:
  prometheus-data:
