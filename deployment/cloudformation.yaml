AWSTemplateFormatVersion: "2010-09-09"
Description: Quote Generation System — API Gateway + 13 Workers (Fargate)

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Comma-separated subnets
  MongoDBUri:
    Type: String
    NoEcho: true
  S3AccessKey:
    Type: String
    NoEcho: true
  S3SecretKey:
    Type: String
    NoEcho: true
  S3Endpoint:
    Type: String
  S3Bucket:
    Type: String
    Default: quote-gen-uploads
  S3Region:
    Type: String
    Default: us-east-1
  SmtpHost:
    Type: String
  SmtpPort:
    Type: String
    Default: "587"
  SmtpUser:
    Type: String
    NoEcho: true
  SmtpPass:
    Type: String
    NoEcho: true
  QuoteExpiryHours:
    Type: Number
    Default: 24
  QuoteTimeoutSeconds:
    Type: Number
    Default: 25

Resources:

  # ── ECS Cluster ──

  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: quote-gen-cluster

  # ── Security Groups ──

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB — inbound HTTP
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  EcsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS tasks — allow from ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          SourceSecurityGroupId: !Ref AlbSecurityGroup

  # ── Application Load Balancer ──

  Alb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: quote-gen-alb
      Subnets: !Ref SubnetIds
      SecurityGroups: [!Ref AlbSecurityGroup]
      Scheme: internet-facing
      Type: application

  AlbListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref Alb
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ApiTargetGroup

  ApiTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: quote-gen-api-tg
      Port: 3000
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30

  # ── S3 Buckets ──

  UploadsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3Bucket
      LifecycleConfiguration:
        Rules:
          - Id: ExpireAfter30Days
            Status: Enabled
            ExpirationInDays: 30

  PdfsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${S3Bucket}-pdfs"
      LifecycleConfiguration:
        Rules:
          - Id: ExpireAfter30Days
            Status: Enabled
            ExpirationInDays: 30

  # ── SQS Queue ──

  EventBusQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: quote-events
      VisibilityTimeout: 300
      MessageRetentionPeriod: 1209600

  # ── IAM Role ──

  EcsTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: quote-gen-ecs-execution
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: QuoteGenS3SqsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${S3Bucket}/*"
                  - !Sub "arn:aws:s3:::${S3Bucket}-pdfs/*"
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                  - sqs:GetQueueUrl
                Resource: !GetAtt EventBusQueue.Arn

  # ── CloudWatch Log Group — API ──

  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/quote-gen-api
      RetentionInDays: 14

  # ── API Gateway Task Definition + Service ──

  ApiTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: quote-gen-api
      Cpu: "256"
      Memory: "512"
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt EcsTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt EcsTaskExecutionRole.Arn
      ContainerDefinitions:
        - Name: api
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/quote-gen-api:latest"
          PortMappings:
            - ContainerPort: 3000
          Environment:
            - Name: MONGODB_URI
              Value: !Ref MongoDBUri
            - Name: S3_ENDPOINT
              Value: !Ref S3Endpoint
            - Name: S3_REGION
              Value: !Ref S3Region
            - Name: S3_ACCESS_KEY
              Value: !Ref S3AccessKey
            - Name: S3_SECRET_KEY
              Value: !Ref S3SecretKey
            - Name: S3_BUCKET
              Value: !Ref S3Bucket
            - Name: SMTP_HOST
              Value: !Ref SmtpHost
            - Name: SMTP_PORT
              Value: !Ref SmtpPort
            - Name: SMTP_USER
              Value: !Ref SmtpUser
            - Name: SMTP_PASS
              Value: !Ref SmtpPass
            - Name: QUOTE_EXPIRY_HOURS
              Value: !Ref QuoteExpiryHours
            - Name: QUOTE_TIMEOUT_SECONDS
              Value: !Ref QuoteTimeoutSeconds
            - Name: SQS_QUEUE_URL
              Value: !Ref EventBusQueue
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ApiLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: api

  ApiService:
    Type: AWS::ECS::Service
    Properties:
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref ApiTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets: !Ref SubnetIds
          SecurityGroups: [!Ref EcsSecurityGroup]
          AssignPublicIp: ENABLED
      LoadBalancers:
        - TargetGroupArn: !Ref ApiTargetGroup
          ContainerName: api
          ContainerPort: 3000
    DependsOn: AlbListener

