services:
  mongodb:
    image: mongo:7
    container_name: quote-gen-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: quote-gen
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: quote-gen-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_NOTIFY_WEBHOOK_ENABLE_quotegen: "on"
      MINIO_NOTIFY_WEBHOOK_ENDPOINT_quotegen: "http://host.docker.internal:3000/internal/s3-event"
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: quote-gen-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb local/quote-gen-uploads --ignore-existing &&
      mc event add local/quote-gen-uploads arn:minio:sqs::quotegen:webhook -p --event put --overwrite &&
      echo 'Minio bucket created and Redis event subscription added'
      "

  redis:
    image: redis:7-alpine
    container_name: quote-gen-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-insight:
    image: redis/redisinsight:latest
    container_name: quote-gen-redis-insight
    ports:
      - "5540:5540"
    volumes:
      - redis-insight-data:/data
    depends_on:
      redis:
        condition: service_healthy

  mailpit:
    image: axllent/mailpit:latest
    container_name: quote-gen-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    volumes:
      - mailpit-data:/data

volumes:
  mongo-data:
  minio-data:
  redis-data:
  redis-insight-data:
  mailpit-data:
